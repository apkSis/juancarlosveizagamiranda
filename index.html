document.addEventListener("DOMContentLoaded", function() {
  const INTERVAL_TIME = 4000; // Milisegundos entre rotaciones
  const banners = document.querySelectorAll('.banner-card');

  banners.forEach(banner => {
    const slides = banner.querySelectorAll('.slide');
    const playPauseBtn = banner.querySelector('.play-pause-btn');
    const prevBtn = banner.querySelector('.prev-btn');
    const nextBtn = banner.querySelector('.next-btn');
    
    let currentIndex = 0;
    let isPlaying = true;
    let timer = null;

    const PLAY_SYMBOL = "&#9658;";   
    const PAUSE_SYMBOL = "&#9646;&#9646;"; 

    function handleVideoPlayback(slideElement, action) {
      const video = slideElement.querySelector('video');
      if (video) {
        if (action === 'play' && isPlaying) {
          video.currentTime = 0;
          video.play().catch(() => {}); 
        } else {
          video.pause();
        }
      }
    }

    function showSlide(index) {
      handleVideoPlayback(slides[currentIndex], 'pause');
      slides[currentIndex].classList.remove('active');
      currentIndex = (index + slides.length) % slides.length;
      slides[currentIndex].classList.add('active');
      handleVideoPlayback(slides[currentIndex], 'play');
    }

    function nextSlide() { showSlide(currentIndex + 1); }
    function prevSlide() { showSlide(currentIndex - 1); }

    function startTimer() {
      if (timer) clearInterval(timer);
      timer = setInterval(nextSlide, INTERVAL_TIME);
    }

    function stopTimer() { if (timer) clearInterval(timer); }

    function togglePlayPause() {
      if (isPlaying) {
        isPlaying = false;
        stopTimer();
        playPauseBtn.innerHTML = PLAY_SYMBOL;
        handleVideoPlayback(slides[currentIndex], 'pause');
      } else {
        isPlaying = true;
        startTimer();
        playPauseBtn.innerHTML = PAUSE_SYMBOL;
        handleVideoPlayback(slides[currentIndex], 'play');
      }
    }

    playPauseBtn.addEventListener('click', togglePlayPause);
    nextBtn.addEventListener('click', function() { nextSlide(); if (isPlaying) startTimer(); });
    prevBtn.addEventListener('click', function() { prevSlide(); if (isPlaying) startTimer(); });

    startTimer();
    handleVideoPlayback(slides[currentIndex], 'play');
  });
});
